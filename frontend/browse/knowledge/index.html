<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainy — Knowledge</title>
  <meta name="theme-color" content="#F7F3ED">
  <link rel="icon" href="../../icons/icon-192.png">
  <link rel="stylesheet" href="../../shared.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <main>
    <h1>Knowledge</h1>

    <div id="auth-section">
      <p>Sign in to view your knowledge base.</p>
      <button id="login-btn" type="button">Sign in with Google</button>
    </div>

    <div id="content-section" style="display:none">
      <div id="top-bar"><button id="logout-btn" type="button">Sign out</button></div>

      <div id="filters">
        <div class="filter-group">
          <span class="filter-label">Path prefix</span>
          <input type="text" id="path-search" placeholder="e.g. tools/docker" autocomplete="off">
        </div>
      </div>

      <div id="cards"></div>
      <div id="status-msg"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../config.local.js"></script>
  <script src="../../config.js"></script>
  <script src="../../nav.js"></script>
  <script src="../../utils.js"></script>
  <script src="app.js"></script>
</body>
</html>
