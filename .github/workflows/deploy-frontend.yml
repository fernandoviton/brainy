name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Supabase config
        run: node scripts/inject-config.js frontend/config.js
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}

      - name: Validate config injection
        run: node scripts/validate-config.js frontend/config.js

      # index.html loads config.local.js via script tag; create an empty file
      # so the browser doesn't 404 (locally, users create their own with credentials)
      - name: Create empty config.local.js
        run: touch frontend/config.local.js

      - name: Generate version.js
        run: |
          cat > frontend/version.js << JSEOF
          var VERSION = {
              timestamp: '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
              commit: '${GITHUB_SHA::7}',
          };
          JSEOF

      - name: Prepare site
        run: cp -r frontend _site

      - uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
